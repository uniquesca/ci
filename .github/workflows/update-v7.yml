name: Update v7 branch

on:
  push:
    branches:
      - main

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --local user.email "service@uniques.ca"
          git config --local user.name "CI"

      - name: Merge main into v7
        run: |
          git fetch origin v7:v7
          git checkout v7
          git merge origin/main -m "CI: merge main into v7 [skip-ci]"
          git push origin v7
