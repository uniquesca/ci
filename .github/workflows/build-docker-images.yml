name: Build Docker images

on:
  push:
    tags:
      - '*'

jobs:
  docker-build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: [ 5.6, 8.1, 8.2, 8.3, 8.4 ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ vars.USERNAME_GITHUB }}
          password: ${{ secrets.GHA_PUBLIC_ACCESS_TOKEN }}

      - name: Choose PHP base image
        id: php-image
        run: |
          if [ "${{ matrix.php-version }}" = "5.6" ]; then
            echo "modphp-base-image=php:5.6-apache-jessie" >> $GITHUB_OUTPUT
            echo "fpm-base-image=php:5.6-fpm-jessie" >> $GITHUB_OUTPUT
            echo "node-version=16" >> $GITHUB_OUTPUT
          else
            echo "modphp-base-image=php:${{ matrix.php-version }}-apache-bookworm" >> $GITHUB_OUTPUT
            echo "fpm-base-image=php:${{ matrix.php-version }}-fpm-bookworm" >> $GITHUB_OUTPUT
            echo "node-version=20" >> $GITHUB_OUTPUT
          fi

      - name: Build and push PROD Docker image
        uses: docker/build-push-action@v7
        with:
          file: docker/php-prod/Dockerfile
          push: true
          tags: ghcr.io/uniquesca/php-prod:${{ matrix.php-version }}
          build-args: |
            PHP_VERSION=${{ matrix.php-version }}
            PHP_BASE_IMAGE=${{ steps.php-image.outputs.modphp-base-image }}
            NODE_VERSION=${{ steps.php-image.outputs.node-version }}

      - name: Build and push PROD FPM Docker image
        uses: docker/build-push-action@v7
        with:
          file: docker/php-fpm-prod/Dockerfile
          push: true
          tags: ghcr.io/uniquesca/php-fpm-prod:${{ matrix.php-version }}
          build-args: |
            PHP_VERSION=${{ matrix.php-version }}
            PHP_BASE_IMAGE=${{ steps.php-image.outputs.fpm-base-image }}
            NODE_VERSION=${{ steps.php-image.outputs.node-version }}
            
      - name: Build and push DEMO Docker image
        uses: docker/build-push-action@v7
        with:
          file: docker/php-demo/Dockerfile
          push: true
          tags: ghcr.io/uniquesca/php-demo:${{ matrix.php-version }}
          build-args: |
            PHP_VERSION=${{ matrix.php-version }}

      - name: Build and push DEMO FPM Docker image
        uses: docker/build-push-action@v7
        with:
          file: docker/php-fpm-demo/Dockerfile
          push: true
          tags: ghcr.io/uniquesca/php-fpm-demo:${{ matrix.php-version }}
          build-args: |
            PHP_VERSION=${{ matrix.php-version }}

      - name: Build and push DEV Docker image
        uses: docker/build-push-action@v7
        with:
          file: docker/php-dev/Dockerfile
          push: true
          tags: ghcr.io/uniquesca/php-dev:${{ matrix.php-version }}
          build-args: |
            PHP_VERSION=${{ matrix.php-version }}

      - name: Build and push DEV FPM Docker image
        uses: docker/build-push-action@v7
        with:
          file: docker/php-fpm-dev/Dockerfile
          push: true
          tags: ghcr.io/uniquesca/php-fpm-dev:${{ matrix.php-version }}
          build-args: |
            PHP_VERSION=${{ matrix.php-version }}

